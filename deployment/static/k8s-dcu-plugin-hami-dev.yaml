apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcu-device-plugin-hami
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: dcu-dp-ds-hami
  template:
    metadata:
      labels:
        name: dcu-dp-ds-hami
    spec:
      tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      nodeSelector:
        dcu: "on"
      serviceAccountName: dcu-device-plugin
      containers:
      - image: harbor.sourcefind.cn:5443/dcu/admin/base/dcu-device-plugin:v2.4.1
        name: dcu-dp-cntr
        securityContext:
          privileged: true
        env:
          - name: "PULSE"
            value: "30"
          - name: "RESOURCE_REGISTER_STRATEGY"
            value: "hami"
          - name: "LOG_THRESHOLD"
            value: "INFO"
          - name: "LOG_OUTPUT"
            value: "true"
          - name: "LOG_VERBOSE"
            value: "2"
          - name: "POLICY"
            value: "0"
          - name: "RESOURCE_MULTIPLE"
            value: "false"
          - name: "TOPOLOGY_REGISTER"
            value: "false"
          - name: "NODE_NAME"
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
        volumeMounts:
          - name: dp
            mountPath: /var/lib/kubelet/device-plugins
          - name: dev
            mountPath: /dev
          - name: etc-vdev
            mountPath: /etc/vdev
          - name: hyhal
            mountPath: /opt/hyhal
            readOnly: true
          - name: code
            mountPath: /root/k8s-device-plugin
      volumes:
        - name: dp
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: etc-vdev
          hostPath:
            path: /etc/vdev
            type: DirectoryOrCreate
        - name: dev
          hostPath:
            path: /dev
        - name: hyhal
          hostPath:
            path: /opt/hyhal
        - name: code
          hostPath:
            path: /public/wangzhqa/dcu-k8s/k8s-dcu-device-plugin/k8s-device-plugin
            type: File

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dcu-device-plugin
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - update
      - list
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - update
      - patch
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dcu-device-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dcu-device-plugin
subjects:
  - kind: ServiceAccount
    name: dcu-device-plugin
    namespace: kube-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dcu-device-plugin
  namespace: kube-system
