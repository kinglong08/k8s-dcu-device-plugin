apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcu-device-plugin-mig
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: dcu-dp-ds-mig
  template:
    metadata:
      annotations:
        scheduler.alpha.kubernetes.io/critical-pod: ""
      labels:
        name: dcu-dp-ds-mig
    spec:
      nodeSelector:
        dcu-mode: mig
        hygon.com/dcu: "true"
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
      containers:
        - image: harbor.sourcefind.cn:5443/dcu/admin/base/dcu-device-plugin:v2.4.2
          name: dcu-dp-cntr
          securityContext:
            privileged: true
          env:
            - name: "PULSE"
              value: "30"
            - name: "RESOURCE_REGISTER_STRATEGY"
              value: "mig"
            - name: "LOG_THRESHOLD"
              value: "INFO"
            - name: "LOG_VERBOSE"
              value: "2"
            - name: "LOG_OUTPUT"
              value: "true"
            - name: "NODE_NAME"
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: dp
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
            - name: dmi-mig
              mountPath: /etc/dmi_mig_config
              readOnly: true
            - name: hyhal
              readOnly: true
              mountPath: /opt/hyhal
      volumes:
        - name: dp
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: dev
          hostPath:
            path: /dev
        - name: dmi-mig
          hostPath:
            path: /etc/dmi_mig_config
            type: DirectoryOrCreate
        - name: hyhal
          hostPath:
            path: /opt/hyhal
