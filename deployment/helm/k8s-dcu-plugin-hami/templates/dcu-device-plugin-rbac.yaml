apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dcu-device-plugin
  labels:
  {{- include "k8s-dcu-plugin-hami.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - update
  - list
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - update
  - patch
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dcu-device-plugin
  labels:
  {{- include "k8s-dcu-plugin-hami.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dcu-device-plugin
subjects:
- kind: ServiceAccount
  name: dcu-device-plugin
  namespace: '{{ .Release.Namespace }}'
